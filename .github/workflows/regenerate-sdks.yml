name: Regenerate SDKs

on:
  workflow_dispatch:
    inputs:
      docs_ref:
        description: Branch or tag of coval-ai/docs to pull specs from
        required: false
        default: main
  schedule:
    # Weekly Monday 09:00 UTC. Refreshes the SDK against the latest OpenAPI
    # specs and opens a PR if anything changed.
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout coval-examples
        uses: actions/checkout@v4

      - name: Checkout docs repo (specs source)
        uses: actions/checkout@v4
        with:
          repository: coval-ai/docs
          ref: ${{ github.event.inputs.docs_ref || 'main' }}
          path: coval-docs
          token: ${{ secrets.DOCS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java (openapi-generator-cli)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install scripts deps
        run: npm ci --prefix scripts || npm install --prefix scripts

      - name: Bundle spec
        env:
          COVAL_SPECS_DIR: ${{ github.workspace }}/coval-docs/api-reference/v1
        run: node scripts/bundle-spec.mjs

      - name: Generate SDKs
        run: bash scripts/generate-sdks.sh

      - name: Install TS SDK deps + build + test
        working-directory: typescript-sdk
        run: |
          npm install
          npm run build
          npm test

      - name: Install Python SDK + run example (--raw, smoke compile only)
        working-directory: python-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -c "import coval_sdk; print(coval_sdk.__version__)"

      - name: Open PR if there are changes
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sdks): regenerate from latest OpenAPI specs"
          title: "chore(sdks): regenerate from latest OpenAPI specs"
          body: |
            Automated SDK regeneration from `coval-ai/docs@${{ github.event.inputs.docs_ref || 'main' }}`.

            - Bundled `dist/coval-openapi.yaml`
            - Regenerated `typescript-sdk/src/generated/` + `python-sdk/src/coval_sdk/`
            - TS tests passed in CI

            If only the OpenAPI marker timestamp changed, this PR can be closed
            without merging.
          branch: chore/regenerate-sdks-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            dist/coval-openapi.yaml
            typescript-sdk/src/generated/
            python-sdk/src/coval_sdk/
