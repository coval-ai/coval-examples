name: Regenerate SDKs

# Weekly cron + manual dispatch. Pulls the latest OpenAPI specs from
# coval-ai/docs, regenerates @coval/sdk (TypeScript) + coval-sdk (Python),
# runs build + tests, and opens (or updates) a single rolling regen PR.
#
# Prerequisites — set these as repository secrets before the first run:
#
#   DOCS_REPO_TOKEN (required for cross-org checkout of coval-ai/docs)
#     Personal Access Token with `repo` read access to coval-ai/docs.
#     The default GITHUB_TOKEN only scopes to this repo and cannot read
#     coval-ai/docs.
#
#   REGEN_PR_TOKEN (required to open the auto-PR)
#     Personal Access Token with `repo` scope on coval-ai/coval-examples.
#     Used in place of GITHUB_TOKEN for the create-pull-request step
#     because the coval-ai org ruleset disallows GitHub Actions from
#     creating PRs via GITHUB_TOKEN. User PATs bypass that restriction.
#
# Hardening notes (TRACE-83):
#   - Deps installed via `npm ci` against committed lockfiles only — no
#     fallback to floating versions
#   - openapi-generator-cli pinned to 2.13.4 in scripts/generate-sdks.sh
#   - Determinism check re-runs codegen and fails on drift
#   - PR branch is stable so peter-evans/create-pull-request updates the
#     same PR in place instead of accumulating per-run branches

on:
  workflow_dispatch:
    inputs:
      docs_ref:
        description: Branch or tag of coval-ai/docs to pull specs from
        required: false
        default: main
  schedule:
    # Weekly Monday 09:00 UTC.
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout coval-examples
        uses: actions/checkout@v4

      - name: Checkout docs repo (specs source)
        uses: actions/checkout@v4
        with:
          repository: coval-ai/docs
          ref: ${{ github.event.inputs.docs_ref || 'main' }}
          path: coval-docs
          # DOCS_REPO_TOKEN must be configured as a repo secret. GITHUB_TOKEN
          # cannot read another repository in the org by default.
          token: ${{ secrets.DOCS_REPO_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            scripts/package-lock.json
            typescript-sdk/package-lock.json

      - name: Set up Java (openapi-generator-cli)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install scripts deps
        run: npm ci --prefix scripts

      - name: Verify Python SDK versions are in sync
        run: node scripts/check-python-sdk-version.mjs

      - name: Bundle spec
        env:
          COVAL_SPECS_DIR: ${{ github.workspace }}/coval-docs/api-reference/v1
        run: node scripts/bundle-spec.mjs

      - name: Generate SDKs (pass 1)
        run: bash scripts/generate-sdks.sh

      - name: Determinism check (regenerate into tmp + diff)
        env:
          COVAL_SPECS_DIR: ${{ github.workspace }}/coval-docs/api-reference/v1
        run: |
          set -euo pipefail
          # Snapshot pass-1 output.
          cp -r typescript-sdk/src/generated /tmp/ts-pass-1
          cp -r python-sdk/src/coval_sdk /tmp/py-pass-1
          cp dist/coval-openapi.yaml /tmp/spec-pass-1.yaml
          # Re-run bundle + codegen.
          node scripts/bundle-spec.mjs
          bash scripts/generate-sdks.sh
          # Diff. Any change between passes = upstream non-determinism.
          echo "=== TypeScript generated diff ==="
          diff -r /tmp/ts-pass-1 typescript-sdk/src/generated
          echo "=== Python generated diff ==="
          diff -r /tmp/py-pass-1 python-sdk/src/coval_sdk
          echo "=== bundled spec diff ==="
          diff /tmp/spec-pass-1.yaml dist/coval-openapi.yaml
          echo "✓ Codegen output is deterministic across two consecutive runs."

      - name: Install TS SDK deps + build + test
        working-directory: typescript-sdk
        run: |
          npm ci
          npm run build
          npm test

      - name: Install Python SDK + smoke import
        working-directory: python-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -c "import coval_sdk; print('coval-sdk version:', coval_sdk.__version__)"

      - name: Open / update regen PR if there are changes
        uses: peter-evans/create-pull-request@v7
        with:
          # Uses a user PAT instead of GITHUB_TOKEN because the coval-ai
          # org ruleset disallows GitHub Actions from creating PRs via
          # the default ephemeral token. The PAT authenticates as its
          # owner (callumreidcoval), which is not subject to that gate.
          token: ${{ secrets.REGEN_PR_TOKEN }}
          commit-message: "chore(sdks): regenerate from latest OpenAPI specs"
          title: "chore(sdks): regenerate from latest OpenAPI specs"
          body: |
            Automated SDK regeneration from `coval-ai/docs@${{ github.event.inputs.docs_ref || 'main' }}`.

            - Bundled `dist/coval-openapi.yaml`
            - Regenerated `typescript-sdk/src/generated/` + `python-sdk/src/coval_sdk/`
            - Determinism check passed (two consecutive runs produced identical output)
            - TS tests passed, Python import smoke passed

            If only the OpenAPI marker timestamp changed, this PR can be closed
            without merging.
          # Stable branch name — peter-evans/create-pull-request updates the
          # existing PR in place instead of opening a new one each run.
          branch: chore/regenerate-sdks
          delete-branch: false
          add-paths: |
            dist/coval-openapi.yaml
            typescript-sdk/src/generated/
            python-sdk/src/coval_sdk/
            python-sdk/GENERATED_README.md
