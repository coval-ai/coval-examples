name: SDK CI

on:
  pull_request:
    paths:
      - ".github/workflows/*sdk*.yml"
      - ".openapi-generator-config/**"
      - "python-sdk/**"
      - "scripts/**"
      - "typescript-sdk/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*sdk*.yml"
      - ".openapi-generator-config/**"
      - "python-sdk/**"
      - "scripts/**"
      - "typescript-sdk/**"

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            scripts/package-lock.json
            typescript-sdk/package-lock.json
      - name: Audit codegen dependencies
        run: |
          npm ci --prefix scripts
          npm audit --prefix scripts --audit-level=moderate
      - name: Build, test, and inspect package
        working-directory: typescript-sdk
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run build
          npm test
          npm pack --dry-run

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python-sdk/pyproject.toml
      - name: Install and test
        working-directory: python-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest
          python -m build
          python -m twine check dist/*
